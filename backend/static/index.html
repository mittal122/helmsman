<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Helmsman</title>
<style>
  body { font-family: ui-monospace, Menlo, monospace; background:#0d1319; color:#e9eff3; margin:0; padding:24px; }
  h1 { font-size:1.1rem; color:#2dd4bf; }
  form { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  input { background:#141d26; border:1px solid #25323d; color:#e9eff3; padding:6px 8px; border-radius:6px; }
  button { background:#2dd4bf; color:#0d1319; border:0; padding:6px 14px; border-radius:6px; font-weight:700; cursor:pointer; }
  #log { background:#141d26; border:1px solid #25323d; border-radius:10px; padding:12px; height:60vh; overflow:auto; }
  .ev { padding:3px 0; border-bottom:1px solid #1b2731; font-size:.85rem; }
  .stage { color:#60a5fa; } .error { color:#f87171; } .endpoint { color:#34d399; }
  .t { color:#647585; }
</style>
</head>
<body>
  <h1>⎈ Helmsman — live deployment</h1>
  <details style="margin-bottom:12px"><summary>Not containerized? Get a setup prompt</summary>
    <input id="ob-desc" placeholder="describe your app (e.g. node express api on 3000)" style="width:60%">
    <button id="ob-btn">Get prompt</button>
    <pre id="ob-out" style="white-space:pre-wrap;color:#93a4b3"></pre>
  </details>
  <details style="margin-bottom:12px"><summary>Suggest config for me</summary>
    <input id="ca-name" placeholder="name"><input id="ca-image" placeholder="image"><button id="ca-btn">Suggest</button>
    <pre id="ca-out" style="white-space:pre-wrap;color:#93a4b3"></pre>
  </details>
  <form id="f">
    <input name="name" placeholder="name" value="demo" required>
    <input name="image" placeholder="image" value="mendhak/http-https-echo:31" required>
    <input name="namespace" placeholder="namespace" value="default">
    <input name="port" placeholder="port" value="8080" type="number">
    <input name="replicas" placeholder="replicas" value="2" type="number">
    <select name="mode"><option value="manual">Manual</option><option value="autonomous">Autonomous</option></select>
    <span style="margin-left:8px">
      <input id="rb-rev" type="number" placeholder="rev" style="width:60px">
      <button id="rb-btn" type="button" style="background:#f87171">Rollback</button>
    </span>
    <input name="env" placeholder="env KEY=VAL,KEY2=VAL2">
    <input name="secrets" placeholder="secrets KEY=VAL (redacted)">
    <button type="submit">Deploy</button>
  </form>
  <div id="approve" style="display:none;margin:10px 0;padding:10px;border:1px solid #2dd4bf;border-radius:8px">
    <span id="approve-msg"></span>
    <button id="btn-approve" style="background:#2dd4bf">Approve</button>
    <button id="btn-reject" style="background:#f87171">Reject</button>
  </div>
  <div id="log"></div>
  <div id="monitor" style="display:none;margin-top:12px;padding:10px;border:1px solid #25323d;border-radius:8px">
    <b>Monitoring</b> <button id="btn-stop" style="background:#f87171;float:right">Stop</button>
    <div id="failures" style="color:#f87171;margin:6px 0"></div>
    <div id="metrics" style="font-family:monospace;font-size:.8rem;color:#93a4b3"></div>
  </div>
<script>
  function kv(s){ const o={}; (s||"").split(",").map(x=>x.trim()).filter(Boolean).forEach(p=>{const i=p.indexOf("=");if(i>0)o[p.slice(0,i)]=p.slice(i+1);}); return o; }
  let currentName = "";
  let currentNamespace = "default";
  const log = document.getElementById("log");
  const approveBar = document.getElementById("approve");
  const es = new EventSource("/events");
  es.onmessage = (m) => {
    const e = JSON.parse(m.data);
    const div = document.createElement("div");
    div.className = "ev " + (e.type === "error" ? "error" : e.type === "endpoint" ? "endpoint" : e.type.startsWith("stage") ? "stage" : "");
    const time = new Date(e.ts * 1000).toLocaleTimeString();
    let extra = "";
    if (e.type === "endpoint") extra = " → " + (e.data.port_forward || "");
    if (e.type === "error" && e.data.issues) extra = " → " + e.data.issues.join("; ");
    const t = document.createElement("span");
    t.className = "t";
    t.textContent = time;
    div.appendChild(t);
    div.appendChild(document.createTextNode(` [${e.stage}] ${e.message}${extra}`));
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    if (e.type === "approval_required") {
      document.getElementById("approve-msg").textContent = e.message + " ";
      approveBar.style.display = "block";
    }
    if (e.type === "health") {
      document.getElementById("monitor").style.display = "block";
      const met = document.getElementById("metrics");
      met.textContent = (e.data.metrics || []).map(m => `${m.pod}  cpu ${m.cpu}  mem ${m.memory}`).join("\n");
      const fl = document.getElementById("failures");
      fl.textContent = (e.data.failures || []).map(f => `⚠ ${f.type} on ${f.pod}`).join("\n");
    }
    if (e.type === "explanation") {
      const div = document.createElement("div");
      div.className = "ev endpoint";
      div.textContent = `🧠 ${e.message}${e.data.recommended_action ? " — fix: " + e.data.recommended_action : ""}`;
      log.appendChild(div);
    }
    if (e.type === "remediation" || e.type === "escalation") {
      const div = document.createElement("div");
      div.className = "ev " + (e.type === "escalation" ? "error" : "endpoint");
      div.textContent = (e.type === "escalation" ? "⚠ " : "↩ ") + e.message;
      log.appendChild(div);
    }
  };
  document.getElementById("btn-approve").onclick = () => fetch("/approve",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:currentName,approved:true})}).then(()=>approveBar.style.display="none");
  document.getElementById("btn-reject").onclick = () => fetch("/approve",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:currentName,approved:false})}).then(()=>approveBar.style.display="none");
  document.getElementById("btn-stop").onclick = () =>
    fetch("/monitor/stop", {method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({name: currentName})});
  document.getElementById("rb-btn").onclick = () => {
    const rev = parseInt(document.getElementById("rb-rev").value, 10);
    if (!Number.isInteger(rev) || rev <= 0) {
      alert("Enter a valid revision number");
      return;
    }
    fetch("/rollback", {method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({name: currentName, namespace: currentNamespace,
                            revision: rev})});
  };
  document.getElementById("ob-btn").onclick = async () => {
    const r = await fetch("/onboard", {method:"POST",headers:{"Content-Type":"application/json"},
      body: JSON.stringify({app_description: document.getElementById("ob-desc").value})});
    const d = await r.json();
    document.getElementById("ob-out").textContent = d.containerization_prompt || JSON.stringify(d);
  };
  document.getElementById("ca-btn").onclick = async () => {
    const r = await fetch("/advise-config", {method:"POST",headers:{"Content-Type":"application/json"},
      body: JSON.stringify({name: document.getElementById("ca-name").value, image: document.getElementById("ca-image").value})});
    const d = await r.json();
    document.getElementById("ca-out").textContent =
      (d.summary ? d.summary + "\n" : "") + (d.suggestions||[]).map(s => `${s.field}: ${s.value} — ${s.reason}`).join("\n");
  };
  document.getElementById("f").onsubmit = async (ev) => {
    ev.preventDefault();
    const fd = new FormData(ev.target);
    currentName = fd.get("name");
    currentNamespace = fd.get("namespace") || "default";
    await fetch("/deploy", { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        name: fd.get("name"), image: fd.get("image"), namespace: fd.get("namespace"),
        port: Number(fd.get("port")), replicas: Number(fd.get("replicas")),
        mode: fd.get("mode"), env: kv(fd.get("env")), secrets: kv(fd.get("secrets")),
      })});
  };
</script>
</body>
</html>
