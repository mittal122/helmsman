name: app
image: mendhak/http-https-echo:31
port: 8080
replicas: 2
probePath: /
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi
env: {}
secrets: {}
ingress:
  enabled: false
  host: ""
hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPU: 80
pdb:
  enabled: false
  minAvailable: 1
