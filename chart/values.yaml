name: app
image: mendhak/http-https-echo:31
port: 8080
replicas: 2
probePath: /
workload: deployment   # deployment (served) | worker (no Service/Ingress) | cronjob (scheduled)
schedule: ""           # cronjob only: a cron expression, e.g. "*/5 * * * *"
stopGraceSeconds: null # terminationGracePeriodSeconds (graceful shutdown); null = k8s default (30)
dbInitCommand: []      # database_init init_job: migration command run as an initContainer before the app
websockets: false      # true = add WebSocket-friendly ingress timeouts
# multi-service (compose) extras — all optional, defaults keep single-service renders identical
command: []          # container command (compose entrypoint)
args: []             # container args (compose command)
extraPorts: []       # additional container/service ports
runAsUser: null      # securityContext.runAsUser (e.g. postgres 999); null = image default
runAsNonRoot: true   # false lets a stateful image (postgres/mysql) start as root then drop privs
fsGroup: null        # pod fsGroup so a mounted PVC is writable by the service's uid
writableRoot: false  # true drops readOnlyRootFilesystem (stateful third-party images)
dropCapabilities: true  # false keeps default caps so a stateful image's entrypoint can chown/setuid
volumes: []          # [{name, mountPath, size}] -> a PVC per entry + mount
probe:
  type: http         # http | tcp | exec | none
  path: ""           # http only; empty = fall back to probePath
  command: []         # exec only
stack: ""            # compose stack name -> helmsman.dev/stack label (groups the releases)
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi
env: {}
secrets: {}
ingress:
  enabled: false
  host: ""
hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPU: 80
pdb:
  enabled: false
  minAvailable: 1
serviceAccount:
  create: false      # create a dedicated ServiceAccount for this workload
  name: ""           # run the pod under this SA (empty = the namespace default SA)
  annotations: {}     # e.g. cloud workload identity: eks.amazonaws.com/role-arn, iam.gke.io/gcp-service-account
  rules: []           # namespaced RBAC rules -> a Role + RoleBinding (only for apps that call the k8s API)
