{{- if .Values.serviceAccount.rules }}
# Namespaced Role + RoleBinding only (never ClusterRole) — grants stay inside this namespace
# even if the rules came from an untrusted source. The deploy is operator-approved.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.name }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
rules:
{{- range .Values.serviceAccount.rules }}
  - apiGroups: {{ .apiGroups | default (list "") | toJson }}
    resources: {{ .resources | toJson }}
    verbs: {{ .verbs | toJson }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.name }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.name }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name | default .Values.name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
