apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ .Values.name }}
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
      {{- if .Values.extraPorts }}
      name: port-{{ .Values.port }}
      {{- end }}
    {{- range .Values.extraPorts }}
    - port: {{ . }}
      targetPort: {{ . }}
      name: port-{{ . }}
    {{- end }}
