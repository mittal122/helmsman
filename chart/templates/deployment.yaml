{{- if ne .Values.workload "cronjob" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicas }}
  {{- else }}
  # replicas omitted on purpose: the HPA owns the replica count (hardcoding it fights the HPA)
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
  template:
    metadata:
      labels:
        {{- include "app.labels" . | nindent 8 }}
    spec:
      {{- with .Values.stopGraceSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      securityContext:
        {{- if .Values.runAsNonRoot }}
        runAsNonRoot: true
        {{- end }}
        {{- with .Values.runAsUser }}
        runAsUser: {{ . }}
        {{- end }}
        {{- with .Values.fsGroup }}
        fsGroup: {{ . }}
        {{- end }}
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ .Values.name }}
          image: {{ .Values.image | quote }}
          {{- with .Values.command }}
          command:
            {{- range . }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- range . }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.port }}
            {{- range .Values.extraPorts }}
            - containerPort: {{ . }}
            {{- end }}
          envFrom:
{{- if .Values.env }}
            - configMapRef:
                name: {{ .Values.name }}-config
{{- end }}
{{- if .Values.secrets }}
            - secretRef:
                name: {{ .Values.name }}-secret
{{- end }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
          {{- $ptype := (.Values.probe | default dict).type | default "http" }}
          {{- if ne $ptype "none" }}
          livenessProbe:
            {{- include "app.probeHandler" . | nindent 12 }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            {{- include "app.probeHandler" . | nindent 12 }}
            initialDelaySeconds: 3
            periodSeconds: 5
          startupProbe:
            {{- include "app.probeHandler" . | nindent 12 }}
            failureThreshold: 30
            periodSeconds: 2
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: {{ not .Values.writableRoot }}
            {{- if .Values.dropCapabilities }}
            capabilities:
              drop: ["ALL"]
            {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- range .Values.volumes }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- range .Values.volumes }}
        - name: {{ .name }}
          persistentVolumeClaim:
            claimName: {{ $.Values.name }}-{{ .name }}
        {{- end }}
{{- end }}
